<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>企業名</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header>
            <h1>企業名</h1>
            <nav class="nav">
                <ul>
                    <li><a href="#">ホーム</a></li>
                    <li><a href="#">会社概要</a></li>
                    <li><a href="#">会社情報</a></li>
                    <li><a href="#">お問い合わせ</a></li>
                </ul>
            </nav>
        </header>

     <main>

        <section class="hero">
            <h2>私たちのサービスへようこそ</h2>
            <p>最高のソリューションを提供します。</p>
            <a href="#" class="btn">お問い合わせ</a>
        </section>

        <section class="about">
            <h2>会社概要</h2>
            <p>私たちは業界をリードする企業であり、革新的なソリューションを提供しています。</p>

            <h3>事業内容</h3>
            <ul>
                <li>サービス1</li>
                <li>サービス2</li>
                <li>サービス3</li>
            </ul>

            <h3>アクセス</h3>
            <p>住所</p>
        </section>

        <section class="contact">
            <h2>Contact</h2>
            <form action="#" method="post">
                <label for="name">お名前:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">メールアドレス:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">お問い合わせ内容:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">送信</button>
            </form>
        </section>
        </main>

        <footer>
            <p>&copy; 2026 企業名. All rights reserved.</p>
        </footer>
    </body>
</html>
