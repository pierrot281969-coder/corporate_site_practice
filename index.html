<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>企業名</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header class="header">
            <div class="header__inner">
            <h1 class="header__logo">企業名</h1>
            <nav class="header__nav">
                <ul class="header__nav-list">
                    <li class="header__nav-item"><a href="#">ホーム</a></li>
                    <li class="header__nav-item"><a href="#">会社概要</a></li>
                    <li class="header__nav-item"><a href="#">会社情報</a></li>
                    <li class="header__nav-item"><a href="#">お問い合わせ</a></li>
                </ul>
            </nav>
            </div>
        </header>

     <main>
        <section class="hero">
            <div class="hero__inner">
            <h2 class="hero__title">私たちのサービスへようこそ</h2>
            <p class="hero__text">最高のソリューションを提供します。</p>
            <a href="#" class="hero__btn">お問い合わせ</a>
            </div>
        </section>

        <section class="about">
            <div class="about__inner">
            <h2 class="about__title">会社概要</h2>
            <p class="about__text">私たちは業界をリードする企業であり、革新的なソリューションを提供しています。</p>
            <h3 class="about__subtitle">事業内容</h3>
            <ul class="about__list">
                <li>サービス1</li>
                <li>サービス2</li>
                <li>サービス3</li>
            </ul>
            <h3 class="about__subtitle">アクセス</h3>
            <p>住所</p>
            </div>
        </section>

        <section class="contact">
            <div class="contact__inner">
            <h2 class="contact__title">お問い合わせ</h2>
            <form action="#" method="post">
                <label for="name">お名前:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">メールアドレス:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">お問い合わせ内容:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">送信</button>
            </form>
            </div>
        </section>
        </main>

        <footer class="footer">
            <p>&copy; 2026 企業名. All rights reserved.</p>
        </footer>
    </body>
</html>
